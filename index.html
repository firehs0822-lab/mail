<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>답장을 기다리는 편지</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
  margin: 0;
  font-family: 'Noto Sans KR', sans-serif;
  background: linear-gradient(to bottom, #0b1120, #151a33);
  color: #f5f5f5;
}
    .subtitle {
  font-size: 14px;
  opacity: 0.8;
  margin-bottom: 30px;
}

.hint {
  font-size: 13px;
  opacity: 0.7;
  margin-bottom: 10px;
  line-height: 1.6;
}
  </style>
</head>
<body>

  <h1>답장을 기다리는 편지</h1>
<p class="subtitle">
어디에도 꺼내지 못한 이야기를, 이곳에 남겨주세요.
</p>

  <h3>편지 쓰기</h3>
  <input id="nickname" placeholder="닉네임" /><br/>
  <p class="hint">
닉네임은 편하게 적어주세요.<br>
조금 서툴러도 좋습니다.
</p>
  <textarea id="content" placeholder="마음을 적어주세요"></textarea><br/>
  <button onclick="submitPost()">보내기</button>

  <h3>도착한 편지</h3>
  <div id="posts"></div>

<script>
  const supabase = window.supabase.createClient(
    "https://hiydbbrhdmrsryqpyagu.supabase.co",
    "sb_publishable_9N6UXyLmNWFp86N5oWY4yw_InQSYSig"
  );

  async function submitPost() {
    const nickname = document.getElementById("nickname").value;
    const content = document.getElementById("content").value;

    await supabase.from("posts").insert([
      { nickname, content }
    ]);

    alert("편지가 전송되었어요 🌙");
    loadPosts();
  }

  async function loadPosts() {
    const { data } = await supabase
      .from("posts")
      .select("*")
      .order("created_at", { ascending: false });

    const container = document.getElementById("posts");
    container.innerHTML = "";

    data.forEach(post => {
      container.innerHTML += `
        <div class="card">
          <b>${post.nickname}</b>
          <p>${post.content}</p>
        </div>
      `;
    });
  }

  loadPosts();
</script>

</body>
</html>
