<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>답장을 기다리는 편지</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
  <style>
    body {

  font-family: 'Noto Sans KR', sans-serif;
  background: radial-gradient(circle at 20% 30%, #1b2445 0%, transparent 40%),
              radial-gradient(circle at 80% 70%, #1a1f3a 0%, transparent 40%),

 <style>
  body {
  margin: 0;
  font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  background: radial-gradient(circle at 20% 30%, #1b2445 0%, transparent 40%),
              radial-gradient(circle at 80% 70%, #1a1f3a 0%, transparent 40%),
              linear-gradient(to bottom, #0b1120, #0f172a);
  color: #f5f5f5;
}

  .container {
    max-width: 500px;
    margin: 80px auto;
    padding: 40px;
    background: rgba(255, 255, 255, 0.05);
    border-radius: 20px;
    backdrop-filter: blur(10px);
  }

  h1 {
    font-size: 28px;
    font-weight: 500;
    margin-bottom: 10px;
  }

  .subtitle {
    font-size: 14px;
    opacity: 0.8;
    margin-bottom: 30px;
  }

  .hint {
  font-size: 13px;
  opacity: 0.7;
  margin-bottom: 8px;
  line-height: 1.6;
}
  

 input {
  width: 100%;
  padding: 14px;
  border-radius: 15px 15px 0 0;
  border: none;
  outline: none;
  background: #f5f1e6;
  color: #333;
  font-size: 14px;
}

textarea {
  width: 100%;
  padding: 30px 20px;
  border-radius: 0 0 15px 15px;
  border: none;
  outline: none;
  min-height: 200px;
  resize: none;

  background: repeating-linear-gradient(
    to bottom,
    #fdf6e3,
    #fdf6e3 30px,
    #e8dcc5 31px
  );

  color: #333;
  font-size: 15px;
  line-height: 30px;

  text-align: center; /* 기본은 가운데 */
}

  textarea  {
  width: 100%;
  padding: 20px;
  margin-bottom: 15px;
  border-radius: 15px;
  border: none;
  outline: none;
  min-height: 150px;
  resize: none;

  background: repeating-linear-gradient(
    to bottom,
    #fdf6e3,
    #fdf6e3 28px,
    #e8dcc5 29px
  );

  color: #333;
  font-family: 'Noto Serif KR', serif;
  font-size: 15px;
  line-height: 29px;
}

  button {
    margin-top: 10px;
    padding: 10px 20px;
    background-color: #2c355b;
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
  }

  button:hover {
    background-color: #3a4575;
  }

  .card {
    background: rgba(255,255,255,0.05);
    padding: 15px;
    border-radius: 15px;
    margin-top: 15px;
  }
</style>
</head>
<body>
  <div class="container">

  <h1>답장을 기다리는 편지</h1>
<p class="subtitle">
어디에도 꺼내지 못한 이야기를, 이곳에 남겨주세요.
</p>

  <h3>오늘의 이야기를 적어주세요.</h3>
<p class="hint">
당신을 나타낼 이름이면 충분합니다.<br>
조금 서툴러도 좋습니다.
</p>
<input id="nickname" placeholder="이름" />
  <textarea id="content" placeholder="마음을 적어주세요"></textarea><br/>
  <button onclick="submitPost()">편지 보내기</button>

  <h3>도착한 편지</h3>
  <div id="posts"></div>

<script>
  const supabase = window.supabase.createClient(
    "https://hiydbbrhdmrsryqpyagu.supabase.co",
    "sb_publishable_9N6UXyLmNWFp86N5oWY4yw_InQSYSig"
  );

  async function submitPost() {
    const nickname = document.getElementById("nickname").value;
    const content = document.getElementById("content").value;

    await supabase.from("posts").insert([
      { nickname, content }
    ]);

    alert("편지가 전송되었어요 🌙");
    loadPosts();
  }

  async function loadPosts() {
    const { data } = await supabase
      .from("posts")
      .select("*")
      .order("created_at", { ascending: false });

    const container = document.getElementById("posts");
    container.innerHTML = "";

    data.forEach(post => {
      container.innerHTML += `
        <div class="card">
          <b>${post.nickname}</b>
          <p>${post.content}</p>
        </div>
      `;
    });
  }

  loadPosts();

  const textarea = document.getElementById("content");

textarea.addEventListener("focus", () => {
  textarea.style.textAlign = "left";
});

textarea.addEventListener("blur", () => {
  if (textarea.value === "") {
    textarea.style.textAlign = "center";
  }
});
</script>
</div>
</body>
</html>
